<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milkwell — Bag Details</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FDF6EC;
      color: #3E2C1C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .logo { font-size: 2rem; font-weight: 700; color: #D4A843; margin-bottom: 0.5rem; }
    .subtitle { color: #8B7355; margin-bottom: 2rem; font-size: 1.1rem; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
    }
    .card p { line-height: 1.6; color: #5C4A3A; }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .btn {
      display: inline-block;
      background: #D4A843;
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.05rem;
    }
    .btn:hover { background: #C09935; }
  </style>
</head>
<body>
  <div class="logo">Milkwell</div>
  <div class="subtitle">Smart Breast Milk Tracking</div>
  <div class="card">
    <div class="icon">🍼</div>
    <p>This bag is being tracked with Milkwell. Open the app to see its details, or download Milkwell to start tracking your own stash.</p>
  </div>
  <!-- Update this URL once your App Store listing is live -->
